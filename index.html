<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Boss Respawn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-yellow-400 mb-2 flex items-center justify-center gap-3">
                <i class="fa-solid fa-clock"></i> Timer Boss Respawn
            </h1>
            <p class="text-gray-400">Sinkron dengan Bot Discord • Update otomatis</p>
        </header>

        <div id="status" class="text-center text-sm text-gray-500 mb-4">Memuat data terbaru...</div>

        <div id="bossList" class="grid gap-4">
            <div class="text-center text-gray-400 py-10">Menyiapkan jadwal...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-10">
            Data dibaca langsung dari GitHub • Diperbarui otomatis setiap 1 menit
        </footer>
    </div>

    <script>
        let bossInterval = [];
        let bossFixed = [];

        // Alamat sumber data
        const JSON_URL = "https://raw.githubusercontent.com/ferdianto9992-rgb/BotDiscord2/main/database.json";

        // 🔗 DAFTAR LOGO SEMUA BOS
        const bossLogos = {
            "Venatus": "https://i.imgur.com/yHNzBn5.png",
            "Viorent": "https://i.imgur.com/TswLUyO.png",
            "Ego": "https://i.imgur.com/GCpkvSV.png",
            "Araneo": "https://i.imgur.com/846DHtQ.png",
            "LadyDalia": "https://i.imgur.com/Ymj0pme.png",
            "GeneralAquelus": "https://i.imgur.com/oFBMgUH.png",
            "Generalaquelus": "https://i.imgur.com/oFBMgUH.png",
            "Shuliar": "https://i.imgur.com/WJth2tj.png",
            "Amentis": "https://i.imgur.com/hUNJOmi.png",
            "Auraq": "https://i.imgur.com/R4mb23X.png",
            "BaronBraudmore": "https://i.imgur.com/or3ALPa.png",
            "Catena": "https://i.imgur.com/ohqX4Nb.png",
            "Clemantis": "https://i.imgur.com/go33dw7.png",
            "Duplican": "https://i.imgur.com/t2PWifB.png",
            "Gareth": "https://i.imgur.com/VM84PLk.png",
            "Larba": "https://i.imgur.com/qU8cRSB.png",
            "Livera": "https://i.imgur.com/tFk6gsk.png",
            "Metus": "https://i.imgur.com/SuI2aF9.png",
            "Milavy": "https://i.imgur.com/rgVWDrk.png",
            "Neutro": "https://i.imgur.com/DokfQus.png",
            "Ringor": "https://i.imgur.com/wg3j2wF.png",
            "Roderick": "https://i.imgur.com/S2mUejm.png",
            "Saphirus": "https://i.imgur.com/846DHtQ.png",
            "Thymele": "https://i.imgur.com/WJth2tj.png",
            "Titore": "https://i.imgur.com/W32BUjq.png",
            "Undomiel": "https://i.imgur.com/0GGCNSX.png",
            "Wannitas": "https://i.imgur.com/tU8BVxj.png",
            "Secreta": "https://i.imgur.com/69XDCoj.png",
            "Ordo": "https://i.imgur.com/WpLtlty.png",
            "Supore": "https://i.imgur.com/syRfEwZ.png",
            "Chainflock": "https://i.imgur.com/GDiYhBn.png",
            "Benji": "https://i.imgur.com/E8p7ev7.png",
            "Libitina": "https://i.imgur.com/3GLGwuh.png",
            "Rakajeth": "https://i.imgur.com/2o62mvK.png"
        };

        // 📌 PEMISAHAN JENIS BOS
        // ✅ BOS INTERVAL: Waktu berubah, perlu tombol "Sudah Mati"
        const listInterval = [
            "Venatus", "Viorent", "Ego", "Araneo", "LadyDalia",
            "GeneralAquelus", "Generalaquelus", "Shuliar"
        ];

        // ✅ BOS FIXED: Waktu tetap, tidak perlu tombol "Sudah Mati"
        const listFixed = [
            "Amentis", "Auraq", "BaronBraudmore", "Catena", "Clemantis",
            "Duplican", "Gareth", "Larba", "Livera", "Metus", "Milavy",
            "Neutro", "Ringor", "Roderick", "Saphirus", "Thymele", "Titore",
            "Undomiel", "Wannitas", "Secreta", "Ordo", "Supore", "Chainflock",
            "Benji", "Libitina", "Rakajeth"
        ];

        async function loadData() {
            try {
                const res = await fetch(JSON_URL + "?t=" + new Date().getTime());
                if (!res.ok) throw new Error("Gagal terhubung ke data");
                const data = await res.json();
                prosesData(data.boss_respawn);
                document.getElementById('status').textContent = "✅ Data terbaru dimuat";
            } catch (err) {
                document.getElementById('status').innerHTML = `❌ ${err.message}`;
            }
        }

        function prosesData(dataMentah) {
            bossInterval = [];
            bossFixed = [];
            const sekarangUTC = new Date();

            for (const [nama, info] of Object.entries(dataMentah)) {
                if (!info.terakhir_muncul) continue;

                const terakhir = new Date(info.terakhir_muncul);
                let berikutnya = new Date(terakhir.getTime() + info.interval_jam * 3600000);

                while (berikutnya < sekarangUTC) {
                    berikutnya = new Date(berikutnya.getTime() + info.interval_jam * 3600000);
                }

                const data = {
                    nama: nama,
                    waktuBerikutnya: berikutnya,
                    interval: info.interval_jam
                };

                if (listInterval.includes(nama)) {
                    bossInterval.push(data);
                } else if (listFixed.includes(nama)) {
                    bossFixed.push(data);
                }
            }

            // Urutkan Interval dari paling dekat ke paling lama
            bossInterval.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);

            renderTampilan();
        }

        function renderTampilan() {
            const wadah = document.getElementById('bossList');
            const sekarang = new Date();

            // ✅ Logika Fixed: Naik 10 menit sebelum spawn, turun 5 menit sesudah
            const fixedMunculDulu = [];
            const fixedDiBawah = [];

            for (const bos of bossFixed) {
                const selisih = bos.waktuBerikutnya - sekarang;
                const menit = selisih / 60000;

                if (menit > -5 && menit <= 10) {
                    fixedMunculDulu.push(bos);
                } else {
                    fixedDiBawah.push(bos);
                }
            }

            fixedMunculDulu.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);
            fixedDiBawah.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);

            // Urutan akhir tampilan
            const daftarTampil = [
                ...fixedMunculDulu,
                ...bossInterval,
                ...fixedDiBawah
            ];

            if (daftarTampil.length === 0) {
                wadah.innerHTML = `<div class="text-center text-gray-400 py-10">Belum ada jadwal</div>`;
                return;
            }

            wadah.innerHTML = daftarTampil.map(bos => {
                const selisih = Math.max(0, bos.waktuBerikutnya - sekarang);
                const jam = Math.floor(selisih / 3600000);
                const menit = Math.floor((selisih % 3600000) / 60000);
                const detik = Math.floor((selisih % 60000) / 1000);

                const wib = new Date(bos.waktuBerikutnya.getTime() + 7 * 3600000);
                const pht = new Date(bos.waktuBerikutnya.getTime() + 8 * 3600000);
                const strWib = wib.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
                const strPht = pht.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

                const mundur = selisih <= 0 ? "✅ SUDAH MUNCUL!" : `${jam}j ${menit.toString().padStart(2,'0')}m ${detik.toString().padStart(2,'0')}s`;
                const warna = selisih <= 0 ? "text-green-400" : "text-yellow-300";
                const logo = bossLogos[bos.nama] || "https://cdn-icons-png.flaticon.com/512/1698/1698535.png";
                const isFixed = listFixed.includes(bos.nama);
                const label = isFixed ? `<span class="text-xs bg-purple-700 px-2 py-0.5 rounded text-purple-100">FIXED</span>` : `<span class="text-xs bg-blue-700 px-2 py-0.5 rounded text-blue-100">INTERVAL</span>`;
                const garis = isFixed ? "border-purple-500" : "border-blue-500";

                return `
                <div class="bg-gray-800 rounded-lg p-5 shadow-md border-l-4 ${garis} flex items-center gap-4">
                    <img src="${logo}" alt="${bos.nama}" class="w-16 h-16 object-contain rounded-md bg-gray-700 p-1">
                    <div class="flex-1">
                        <h3 class="text-xl font-semibold text-white flex items-center gap-2">
                            ${bos.nama}
                            ${label}
                        </h3>
                        <p class="text-sm text-gray-400">Interval: ${bos.interval} jam</p>
                        <p class="mt-1 text-sm">
                            🇮🇩 ${strWib} WIB &nbsp;&nbsp; 🇵🇭 ${strPht} PHT
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold ${warna} whitespace-nowrap">${mundur}</p>
                    </div>
                </div>`;
            }).join('');
        }

        loadData();
        setInterval(renderTampilan, 1000);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
