<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Boss Respawn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-yellow-400 mb-2 flex items-center justify-center gap-3">
                <i class="fa-solid fa-clock"></i> Timer Boss Respawn
            </h1>
            <p class="text-gray-400">Sinkron penuh dengan Bot Discord • Hanya Tampilan</p>
        </header>

        <div id="status" class="text-center text-sm text-gray-500 mb-4">Memuat data terbaru...</div>

        <div id="bossList" class="grid gap-4">
            <div class="text-center text-gray-400 py-10">Menyiapkan jadwal...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-10">
            Data diperbarui setiap 30 detik • Sumber: Database Bot Discord
        </footer>
    </div>

    <script>
        let bossInterval = [];
        let bossFixed = [];
        const BATAS_ALARM_MENIT = 5;        // Alarm berbunyi 5 menit sebelum spawn
        const LAMA_ALARM_DETIK = 10;        // Berhenti otomatis setelah 10 detik
        const SUDAH_ALARM = new Set();      // Penanda agar tidak berbunyi berulang

        // 🔗 Alamat data dari bot Discord
        const JSON_URL = "https://raw.githubusercontent.com/ferdianto9992-rgb/BotDiscord2/main/database.json";

        // 🖼️ Logo Boss
        const bossLogos = {
            "Venatus": "https://i.imgur.com/yHNzBn5.png",
            "Viorent": "https://i.imgur.com/TswLUyO.png",
            "LadyDalia": "https://i.imgur.com/Ymj0pme.png",
            "Ego": "https://i.imgur.com/GCpkvSV.png",
            "Shuliar": "https://i.imgur.com/WJth2tj.png",
            "Larba": "https://i.imgur.com/qU8cRSB.png",
            "Catena": "https://i.imgur.com/ohqX4Nb.png",
            "Livera": "https://i.imgur.com/tFk6gsk.png",
            "Undomiel": "https://i.imgur.com/0GGCNSX.png",
            "Araneo": "https://i.imgur.com/846DHtQ.png",
            "Wannitas": "https://i.imgur.com/tU8BVxj.png",
            "Metus": "https://i.imgur.com/SuI2aF9.png",
            "Duplican": "https://i.imgur.com/t2PWifB.png",
            "BaronBraudmore": "https://i.imgur.com/or3ALPa.png",
            "Gareth": "https://i.imgur.com/VM84PLk.png",
            "Amentis": "https://i.imgur.com/hUNJOmi.png",
            "Titore": "https://i.imgur.com/W32BUjq.png",
            "GeneralAquleus": "https://i.imgur.com/oFBMgUH.png",
            "Generalaquelus": "https://i.imgur.com/oFBMgUH.png",
            "Ordo": "https://i.imgur.com/WpLtlty.png",
            "Asta": "https://i.imgur.com/69XDCoj.png",
            "Secreta": "https://i.imgur.com/69XDCoj.png",
            "Supore": "https://i.imgur.com/syRfEwZ.png",
            "Clemantis": "https://i.imgur.com/go33dw7.png",
            "Thymele": "https://i.imgur.com/WJth2tj.png",
            "Libitina": "https://i.imgur.com/3GLGwuh.png",
            "Saphirus": "https://i.imgur.com/846DHtQ.png",
            "Neutro": "https://i.imgur.com/DokfQus.png",
            "Rakajeth": "https://i.imgur.com/2o62mvK.png",
            "Auraq": "https://i.imgur.com/R4mb23X.png",
            "Roderick": "https://i.imgur.com/S2mUejm.png",
            "Milavy": "https://i.imgur.com/rgVWDrk.png",
            "Ringor": "https://i.imgur.com/wg3j2wF.png",
            "Chainflock": "https://i.imgur.com/GDiYhBn.png",
            "Tumier": "https://i.imgur.com/69XDCoj.png",
            "Benji": "https://i.imgur.com/E8p7ev7.png"
        };

        // 📋 Daftar Boss Interval
        const listInterval = [
            "Venatus", "Viorent", "LadyDalia", "Ego", "Shuliar", "Larba", "Catena",
            "Livera", "Undomiel", "Araneo", "Wannitas", "Metus", "Duplican",
            "BaronBraudmore", "Gareth", "Amentis", "Titore", "GeneralAquleus",
            "Generalaquelus", "Ordo", "Asta", "Secreta", "Supore"
        ];

        // 📋 Daftar Boss Fixed (Jadwal Tetap)
        const listFixed = [
            { nama: "Clemantis", hari: 1, jam: 10, menit: 30 },
            { nama: "Thymele", hari: 1, jam: 18, menit: 0 },
            { nama: "Libitina", hari: 1, jam: 20, menit: 0 },
            { nama: "Saphirus", hari: 2, jam: 10, menit: 30 },
            { nama: "Neutro", hari: 2, jam: 18, menit: 0 },
            { nama: "Rakajeth", hari: 2, jam: 21, menit: 0 },
            { nama: "Thymele", hari: 3, jam: 10, menit: 30 },
            { nama: "Auraq", hari: 3, jam: 20, menit: 0 },
            { nama: "Neutro", hari: 4, jam: 10, menit: 30 },
            { nama: "Clemantis", hari: 4, jam: 18, menit: 0 },
            { nama: "Roderick", hari: 5, jam: 18, menit: 0 },
            { nama: "Auraq", hari: 5, jam: 21, menit: 0 },
            { nama: "Milavy", hari: 6, jam: 14, menit: 0 },
            { nama: "Ringor", hari: 6, jam: 16, menit: 0 },
            { nama: "Libitina", hari: 6, jam: 20, menit: 0 },
            { nama: "Chainflock", hari: 0, jam: 14, menit: 0 },
            { nama: "Saphirus", hari: 0, jam: 16, menit: 0 },
            { nama: "Rakajeth", hari: 0, jam: 18, menit: 0 },
            { nama: "Tumier", hari: 0, jam: 18, menit: 0 },
            { nama: "Benji", hari: 0, jam: 20, menit: 0 }
        ];

        // ✅ Putar alarm 10 detik saja
        function putarAlarm(namaBoss) {
            if (SUDAH_ALARM.has(namaBoss)) return;
            SUDAH_ALARM.add(namaBoss);

            // Suara alarm standar browser (bisa diganti URL MP3 kalau mau)
            const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-notification-933.mp3");
            audio.volume = 0.7;
            audio.loop = true;
            audio.play().catch(e => console.log("Izinkan suara di browser:", e));

            // Berhenti otomatis setelah 10 detik
            setTimeout(() => {
                audio.pause();
                audio.currentTime = 0;
            }, LAMA_ALARM_DETIK * 1000);

            // Hapus penanda setelah lewat waktu spawn agar bisa alarm lagi nanti
            setTimeout(() => SUDAH_ALARM.delete(namaBoss), 10 * 60 * 1000);
        }

        // ✅ Hitung jadwal Fixed yang otomatis update setiap hari
        function getNextFixedTime(hariTujuan, jamTujuan, menitTujuan) {
            const sekarang = new Date();
            const waktu = new Date(sekarang);
            waktu.setHours(jamTujuan, menitTujuan, 0, 0);
            let selisihHari = hariTujuan - sekarang.getDay();
            if (selisihHari < 0 || (selisihHari === 0 && waktu <= sekarang)) {
                selisihHari += 7;
            }
            waktu.setDate(sekarang.getDate() + selisihHari);
            return waktu;
        }

        // ✅ Ambil data terbaru dari bot
        async function loadData() {
            try {
                const res = await fetch(JSON_URL + "?t=" + Date.now());
                if (!res.ok) throw new Error("Gagal membaca data");
                const data = await res.json();
                prosesData(data.boss_respawn);
                document.getElementById('status').textContent = "✅ Data terbaru dimuat";
            } catch (err) {
                document.getElementById('status').innerHTML = `❌ ${err.message}`;
            }
        }

        // ✅ Proses data untuk dihitung waktunya
        function prosesData(dataMentah) {
            bossInterval = [];
            bossFixed = [];
            const sekarang = new Date();

            // Hitung waktu spawn untuk boss interval
            for (const [nama, info] of Object.entries(dataMentah)) {
                if (!info || !info.terakhir_muncul || !listInterval.includes(nama)) continue;

                const waktuMatiUTC = new Date(info.terakhir_muncul);
                const waktuMatiWIB = new Date(waktuMatiUTC.getTime() + 7 * 3600000);
                const intervalMs = info.interval_jam * 3600000;

                let waktuSpawnWIB = new Date(waktuMatiWIB.getTime() + intervalMs);

                // Jika waktu sudah lewat, lompat ke siklus berikutnya
                while (waktuSpawnWIB < sekarang) {
                    waktuSpawnWIB = new Date(waktuSpawnWIB.getTime() + intervalMs);
                }

                bossInterval.push({
                    nama: nama,
                    waktuSpawnWIB: waktuSpawnWIB,
                    interval: info.interval_jam,
                    isFixed: false
                });
            }

            // Urutkan dari yang paling dekat waktunya
            bossInterval.sort((a, b) => a.waktuSpawnWIB - b.waktuSpawnWIB);

            // Proses jadwal tetap
            for (const bos of listFixed) {
                bossFixed.push({
                    nama: bos.nama,
                    waktuBerikutnya: getNextFixedTime(bos.hari, bos.jam, bos.menit),
                    interval: "Tetap",
                    isFixed: true
                });
            }

            renderTampilan();
        }

        // ✅ Tampilkan ke halaman web + cek alarm
        function renderTampilan() {
            const wadah = document.getElementById('bossList');
            const sekarang = new Date();
            const batasAlarmMs = BATAS_ALARM_MENIT * 60 * 1000;

            // Urutkan boss tetap yang akan muncul terdekat
            const fixedPrioritas = [];
            const fixedBawah = [];
            for (const bos of bossFixed) {
                const selisihMs = bos.waktuBerikutnya - sekarang;
                if (selisihMs > 0 && selisihMs <= batasAlarmMs) {
                    putarAlarm(bos.nama);
                }
                const selisihMenit = selisihMs / 60000;
                selisihMenit > -5 && selisihMenit <= 10 ? fixedPrioritas.push(bos) : fixedBawah.push(bos);
            }
            fixedPrioritas.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);
            fixedBawah.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);

            // Cek alarm untuk boss interval
            for (const bos of bossInterval) {
                const selisihMs = bos.waktuSpawnWIB - sekarang;
                if (selisihMs > 0 && selisihMs <= batasAlarmMs) {
                    putarAlarm(bos.nama);
                }
            }

            const daftarTampil = [...fixedPrioritas, ...bossInterval, ...fixedBawah];
            if (!daftarTampil.length) {
                wadah.innerHTML = `<div class="text-center text-gray-400 py-10">Belum ada jadwal tersedia</div>`;
                return;
            }

            wadah.innerHTML = daftarTampil.map(bos => {
                let selisihMs, jam, menit, detik, waktuWIB, waktuPHT;

                if (!bos.isFixed) {
                    selisihMs = Math.max(0, bos.waktuSpawnWIB - sekarang);
                    waktuWIB = bos.waktuSpawnWIB;
                    waktuPHT = new Date(waktuWIB.getTime() + 3600000);
                } else {
                    selisihMs = Math.max(0, bos.waktuBerikutnya - sekarang);
                    waktuWIB = bos.waktuBerikutnya;
                    waktuPHT = new Date(waktuWIB.getTime() + 3600000);
                }

                jam = Math.floor(selisihMs / 3600000);
                menit = Math.floor((selisihMs % 3600000) / 60000);
                detik = Math.floor((selisihMs % 60000) / 1000);

                const strWIB = waktuWIB.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
                const strPHT = waktuPHT.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

                const mundur = selisihMs <= 0 ? "✅ SUDAH MUNCUL!" : `${jam}j ${menit.toString().padStart(2,'0')}m ${detik.toString().padStart(2,'0')}s`;
                const warna = selisihMs <= 0 ? "text-green-400" : "text-yellow-300";
                const logo = bossLogos[bos.nama] || "https://cdn-icons-png.flaticon.com/512/1698/1698535.png";
                const label = bos.isFixed 
                    ? `<span class="text-xs bg-purple-700 px-2 py-0.5 rounded text-purple-100">FIXED</span>` 
                    : `<span class="text-xs bg-blue-700 px-2 py-0.5 rounded text-blue-100">INTERVAL</span>`;
                const garis = bos.isFixed ? "border-purple-500" : "border-blue-500";

                return `
                <div class="bg-gray-800 rounded-lg p-5 shadow-md border-l-4 ${garis} flex items-center gap-4">
                    <img src="${logo}" alt="${bos.nama}" class="w-16 h-16 object-contain rounded-md bg-gray-700 p-1">
                    <div class="flex-1">
                        <h3 class="text-xl font-semibold text-white flex items-center gap-2">
                            ${bos.nama} ${label}
                        </h3>
                        <p class="text-sm text-gray-400">Interval: ${bos.interval} jam</p>
                        <p class="mt-1 text-sm">🇮🇩 ${strWIB} WIB &nbsp;&nbsp; 🇵🇭 ${strPHT} PHT</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold ${warna} whitespace-nowrap">${mundur}</p>
                    </div>
                </div>`;
            }).join('');
        }

        // Jalankan pembaruan otomatis
        loadData();
        setInterval(renderTampilan, 1000);
        setInterval(loadData, 30000);
    </script>
</body>
</html>
