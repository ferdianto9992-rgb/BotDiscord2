<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Boss Respawn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-yellow-400 mb-2 flex items-center justify-center gap-3">
                <i class="fa-solid fa-clock"></i> Timer Boss Respawn
            </h1>
            <p class="text-gray-400">Sinkron dengan Bot Discord • Update otomatis</p>
        </header>

        <div id="status" class="text-center text-sm text-gray-500 mb-4">Memuat data terbaru...</div>

        <div id="bossList" class="grid gap-4">
            <div class="text-center text-gray-400 py-10">Menyiapkan jadwal...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-10">
            Data dibaca langsung dari GitHub • Diperbarui otomatis setiap 1 menit
        </footer>
    </div>

    <script>
        let bossInterval = [];
        let bossFixed = [];

        // 🔗 Alamat sumber data
        const JSON_URL = "https://raw.githubusercontent.com/ferdianto9992-rgb/BotDiscord2/main/database.json";

        // 🖼️ Daftar logo semua bos
        const bossLogos = {
            "Venatus": "https://i.imgur.com/yHNzBn5.png",
            "Viorent": "https://i.imgur.com/TswLUyO.png",
            "LadyDalia": "https://i.imgur.com/Ymj0pme.png",
            "Ego": "https://i.imgur.com/GCpkvSV.png",
            "Shuliar": "https://i.imgur.com/WJth2tj.png",
            "Larba": "https://i.imgur.com/qU8cRSB.png",
            "Catena": "https://i.imgur.com/ohqX4Nb.png",
            "Livera": "https://i.imgur.com/tFk6gsk.png",
            "Undomiel": "https://i.imgur.com/0GGCNSX.png",
            "Araneo": "https://i.imgur.com/846DHtQ.png",
            "Wannitas": "https://i.imgur.com/tU8BVxj.png",
            "Metus": "https://i.imgur.com/SuI2aF9.png",
            "Duplican": "https://i.imgur.com/t2PWifB.png",
            "BaronBraudmore": "https://i.imgur.com/or3ALPa.png",
            "Gareth": "https://i.imgur.com/VM84PLk.png",
            "Amentis": "https://i.imgur.com/hUNJOmi.png",
            "Titore": "https://i.imgur.com/W32BUjq.png",
            "GeneralAquleus": "https://i.imgur.com/oFBMgUH.png",
            "Ordo": "https://i.imgur.com/WpLtlty.png",
            "Asta": "https://i.imgur.com/69XDCoj.png",
            "Secreta": "https://i.imgur.com/69XDCoj.png",
            "Supore": "https://i.imgur.com/syRfEwZ.png",
            "Clemantis": "https://i.imgur.com/go33dw7.png",
            "Thymele": "https://i.imgur.com/WJth2tj.png",
            "Libitina": "https://i.imgur.com/3GLGwuh.png",
            "Saphirus": "https://i.imgur.com/846DHtQ.png",
            "Neutro": "https://i.imgur.com/DokfQus.png",
            "Rakajeth": "https://i.imgur.com/2o62mvK.png",
            "Auraq": "https://i.imgur.com/R4mb23X.png",
            "Roderick": "https://i.imgur.com/S2mUejm.png",
            "Milavy": "https://i.imgur.com/rgVWDrk.png",
            "Ringor": "https://i.imgur.com/wg3j2wF.png",
            "Chainflock": "https://i.imgur.com/GDiYhBn.png",
            "Tumier": "https://i.imgur.com/69XDCoj.png",
            "Benji": "https://i.imgur.com/E8p7ev7.png"
        };

        // 📋 DAFTAR SESUAI PERMINTAAN
        // ✅ INTERVAL
        const listInterval = [
            "Venatus",
            "Viorent",
            "LadyDalia",
            "Ego",
            "Shuliar",
            "Larba",
            "Catena",
            "Livera",
            "Undomiel",
            "Araneo",
            "Wannitas",
            "Metus",
            "Duplican",
            "BaronBraudmore",
            "Gareth",
            "Amentis",
            "Titore",
            "GeneralAquleus",
            "Ordo",
            "Asta",
            "Secreta",
            "Supore"
        ];

        // ✅ FIXED - Jadwal tetap per hari & jam
        const listFixed = [
            { nama: "Clemantis", hari: 1, jam: 10, menit: 30 },   // Senin 10:30
            { nama: "Thymele", hari: 1, jam: 18, menit: 0 },       // Senin 18:00
            { nama: "Libitina", hari: 1, jam: 20, menit: 0 },       // Senin 20:00
            { nama: "Saphirus", hari: 2, jam: 10, menit: 30 },      // Selasa 10:30
            { nama: "Neutro", hari: 2, jam: 18, menit: 0 },         // Selasa 18:00
            { nama: "Rakajeth", hari: 2, jam: 21, menit: 0 },       // Selasa 21:00
            { nama: "Thymele", hari: 3, jam: 10, menit: 30 },       // Rabu 10:30
            { nama: "Auraq", hari: 3, jam: 20, menit: 0 },           // Rabu 20:00
            { nama: "Neutro", hari: 4, jam: 10, menit: 30 },        // Kamis 10:30
            { nama: "Clemantis", hari: 4, jam: 18, menit: 0 },      // Kamis 18:00
            { nama: "Roderick", hari: 5, jam: 18, menit: 0 },       // Jumat 18:00
            { nama: "Auraq", hari: 5, jam: 21, menit: 0 },          // Jumat 21:00
            { nama: "Milavy", hari: 6, jam: 14, menit: 0 },         // Sabtu 14:00
            { nama: "Ringor", hari: 6, jam: 16, menit: 0 },         // Sabtu 16:00
            { nama: "Libitina", hari: 6, jam: 20, menit: 0 },       // Sabtu 20:00
            { nama: "Chainflock", hari: 0, jam: 14, menit: 0 },     // Minggu 14:00
            { nama: "Saphirus", hari: 0, jam: 16, menit: 0 },       // Minggu 16:00
            { nama: "Rakajeth", hari: 0, jam: 18, menit: 0 },       // Minggu 18:00
            { nama: "Tumier", hari: 0, jam: 18, menit: 0 },         // Minggu 18:00
            { nama: "Benji", hari: 0, jam: 20, menit: 0 }           // Minggu 20:00
        ];

        // Fungsi hitung waktu spawn berikutnya untuk bos Fixed
        function getNextFixedTime(hariTujuan, jamTujuan, menitTujuan) {
            const sekarang = new Date();
            const waktuBerikutnya = new Date(sekarang);

            waktuBerikutnya.setHours(jamTujuan, menitTujuan, 0, 0);

            let selisihHari = hariTujuan - sekarang.getDay();
            if (selisihHari < 0 || (selisihHari === 0 && waktuBerikutnya <= sekarang)) {
                selisihHari += 7;
            }

            waktuBerikutnya.setDate(sekarang.getDate() + selisihHari);
            return waktuBerikutnya;
        }

        async function loadData() {
            try {
                const res = await fetch(JSON_URL + "?t=" + new Date().getTime());
                if (!res.ok) throw new Error("Gagal terhubung ke data");
                const data = await res.json();
                prosesData(data.boss_respawn);
                document.getElementById('status').textContent = "✅ Data terbaru dimuat";
            } catch (err) {
                document.getElementById('status').innerHTML = `❌ ${err.message}`;
            }
        }

        function prosesData(dataMentah) {
            bossInterval = [];
            bossFixed = [];
            const sekarangUTC = new Date();

            // Proses BOS INTERVAL
            for (const [nama, info] of Object.entries(dataMentah)) {
                if (!info || !info.terakhir_muncul || !listInterval.includes(nama)) continue;

                const terakhir = new Date(info.terakhir_muncul);
                let berikutnya = new Date(terakhir.getTime() + info.interval_jam * 3600000);

                while (berikutnya < sekarangUTC) {
                    berikutnya = new Date(berikutnya.getTime() + info.interval_jam * 3600000);
                }

                bossInterval.push({
                    nama: nama,
                    waktuBerikutnya: berikutnya,
                    interval: info.interval_jam,
                    isFixed: false
                });
            }

            // Urutkan Interval dari waktu terdekat ke terlama
            bossInterval.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);

            // Proses BOS FIXED
            for (const bos of listFixed) {
                const waktu = getNextFixedTime(bos.hari, bos.jam, bos.menit);
                bossFixed.push({
                    nama: bos.nama,
                    waktuBerikutnya: waktu,
                    interval: "Tetap",
                    isFixed: true
                });
            }

            renderTampilan();
        }

        function renderTampilan() {
            const wadah = document.getElementById('bossList');
            const sekarang = new Date();

            // ✅ Logika Fixed: Naik ke atas 10 menit sebelum spawn, turun 5 menit sesudahnya
            const fixedMunculDulu = [];
            const fixedDiBawah = [];

            for (const bos of bossFixed) {
                const selisihMenit = (bos.waktuBerikutnya - sekarang) / (1000 * 60);
                if (selisihMenit > -5 && selisihMenit <= 10) {
                    fixedMunculDulu.push(bos);
                } else {
                    fixedDiBawah.push(bos);
                }
            }

            fixedMunculDulu.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);
            fixedDiBawah.sort((a, b) => a.waktuBerikutnya - b.waktuBerikutnya);

            // Urutan akhir tampilan
            const daftarTampil = [
                ...fixedMunculDulu,
                ...bossInterval,
                ...fixedDiBawah
            ];

            if (daftarTampil.length === 0) {
                wadah.innerHTML = `<div class="text-center text-gray-400 py-10">Belum ada jadwal tersedia</div>`;
                return;
            }

            wadah.innerHTML = daftarTampil.map(bos => {
                const selisihMs = Math.max(0, bos.waktuBerikutnya - sekarang);
                const jam = Math.floor(selisihMs / 3600000);
                const menit = Math.floor((selisihMs % 3600000) / 60000);
                const detik = Math.floor((selisihMs % 60000) / 1000);

                const wib = new Date(bos.waktuBerikutnya.getTime() + 7 * 3600000);
                const pht = new Date(bos.waktuBerikutnya.getTime() + 8 * 3600000);
                const strWib = wib.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
                const strPht = pht.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

                const mundur = selisihMs <= 0 ? "✅ SUDAH MUNCUL!" : `${jam}j ${menit.toString().padStart(2,'0')}m ${detik.toString().padStart(2,'0')}s`;
                const warna = selisihMs <= 0 ? "text-green-400" : "text-yellow-300";
                const logo = bossLogos[bos.nama] || "https://cdn-icons-png.flaticon.com/512/1698/1698535.png";
                const label = bos.isFixed 
                    ? `<span class="text-xs bg-purple-700 px-2 py-0.5 rounded text-purple-100">FIXED</span>` 
                    : `<span class="text-xs bg-blue-700 px-2 py-0.5 rounded text-blue-100">INTERVAL</span>`;
                const garis = bos.isFixed ? "border-purple-500" : "border-blue-500";

                return `
                <div class="bg-gray-800 rounded-lg p-5 shadow-md border-l-4 ${garis} flex items-center gap-4">
                    <img src="${logo}" alt="${bos.nama}" class="w-16 h-16 object-contain rounded-md bg-gray-700 p-1">
                    <div class="flex-1">
                        <h3 class="text-xl font-semibold text-white flex items-center gap-2">
                            ${bos.nama}
                            ${label}
                        </h3>
                        <p class="text-sm text-gray-400">Waktu: ${bos.interval}</p>
                        <p class="mt-1 text-sm">
                            🇮🇩 ${strWib} WIB &nbsp;&nbsp; 🇵🇭 ${strPht} PHT
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold ${warna} whitespace-nowrap">${mundur}</p>
                    </div>
                </div>`;
            }).join('');
        }

        loadData();
        setInterval(renderTampilan, 1000);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
